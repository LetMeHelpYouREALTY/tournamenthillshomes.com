# Cloudflare Workers Configuration — tournamenthillshomes.com

name = "tournamenthillshomes-com"
main = "workers/_worker.ts"
compatibility_date = "2026-02-13"
compatibility_flags = ["nodejs_compat"]

account_id = ""
workers_dev = true

[build]
command = "npm run build"

[vars]
DEBUG = "false"

[[routes]]
pattern = "tournamenthillshomes.com/*"
zone_name = "tournamenthillshomes.com"

[[routes]]
pattern = "www.tournamenthillshomes.com/*"
zone_name = "tournamenthillshomes.com"

[dev]
port = 8787
local_protocol = "http"

[env.production]
name = "tournamenthillshomes-com-production"
vars = { DEBUG = "false" }
routes = [
  { pattern = "tournamenthillshomes.com/*", zone_name = "tournamenthillshomes.com" },
  { pattern = "www.tournamenthillshomes.com/*", zone_name = "tournamenthillshomes.com" }
]

[env.staging]
name = "tournamenthillshomes-com-staging"
vars = { DEBUG = "true" }
routes = [
  { pattern = "staging.tournamenthillshomes.com/*", zone_name = "tournamenthillshomes.com" }
]

[observability]
enabled = true
head_sampling_rate = 1

[limits]
cpu_ms = 50
